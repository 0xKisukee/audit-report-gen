<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="auraGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A2BE2" />
      <stop offset="50%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>

    <linearGradient id="cloakGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1F2937" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>

    <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="blur1" />
      <feGaussianBlur stdDeviation="10" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <circle cx="250" cy="230" r="130" fill="url(#auraGradient)" filter="url(#heavyGlow)" opacity="0.4" />
  
  <circle cx="250" cy="230" r="170" fill="none" stroke="#00F2FE" stroke-width="2" stroke-dasharray="15 25" opacity="0.6" filter="url(#neonGlow)" />
  <circle cx="250" cy="230" r="190" fill="none" stroke="#8A2BE2" stroke-width="1.5" stroke-dasharray="50 30 10 30" opacity="0.5" />

  <text x="40" y="120" fill="#00FF87" font-family="monospace, sans-serif" font-size="12" opacity="0.7">require(msg.sender == owner);</text>
  <text x="350" y="90" fill="#00F2FE" font-family="monospace, sans-serif" font-size="12" opacity="0.7">bytes32 hash = keccak256;</text>
  <text x="380" y="320" fill="#8A2BE2" font-family="monospace, sans-serif" font-size="12" opacity="0.7">reentrancyGuard</text>

  <path d="M 90 440 C 130 300 370 300 410 440 Z" fill="url(#cloakGradient)" stroke="#00F2FE" stroke-width="3" opacity="0.95"/>
  
  <path d="M 170 320 C 160 140 340 140 330 320 Z" fill="#0B0F19" stroke="#8A2BE2" stroke-width="4" filter="url(#neonGlow)"/>
  
  <path d="M 190 300 C 190 190 310 190 310 300 Z" fill="#000000" />

  <path d="M 215 240 L 285 240 L 290 255 L 210 255 Z" fill="#00FF87" filter="url(#neonGlow)" />
  <rect x="248" y="240" width="4" height="15" fill="#000000" /> <polygon points="120,380 380,380 460,470 40,470" fill="#001829" opacity="0.8" stroke="#00F2FE" stroke-width="2" filter="url(#neonGlow)" />
  
  <line x1="140" y1="400" x2="360" y2="400" stroke="#00FF87" stroke-width="3" stroke-dasharray="12 8" filter="url(#neonGlow)" />
  <line x1="120" y1="425" x2="380" y2="425" stroke="#00FF87" stroke-width="4" stroke-dasharray="18 10" filter="url(#neonGlow)" />
  <line x1="90" y1="450" x2="410" y2="450" stroke="#00F2FE" stroke-width="5" stroke-dasharray="25 12" filter="url(#neonGlow)" />

  <path d="M 170 410 C 190 390 210 390 220 405" fill="none" stroke="#8A2BE2" stroke-width="12" stroke-linecap="round" filter="url(#neonGlow)" />
  <path d="M 330 410 C 310 390 290 390 280 405" fill="none" stroke="#8A2BE2" stroke-width="12" stroke-linecap="round" filter="url(#neonGlow)" />

  <path d="M 235 60 L 265 60 L 265 80 L 235 80 Z" fill="#00F2FE" filter="url(#neonGlow)" />
  <path d="M 240 60 C 240 45 260 45 260 60" fill="none" stroke="#00F2FE" stroke-width="4" filter="url(#neonGlow)" />
</svg>